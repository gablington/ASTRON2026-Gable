source: J1600-3053gbt
par-directory: results/
tim-directory: /nanograv/timing/releases/15y/toagen/releases/2021.08.25-9d8d617/
timing-model: J1600-3053gbt_PINT_20230131.wb.par
compare-model: archive/J1600-3053gbt_PINT_20230125.wb.par
toas:
- J1600-3053.Rcvr1_2.GASP.15y.x.wb.tim
- J1600-3053.Rcvr1_2.GUPPI.15y.x.wb.tim
- J1600-3053.Rcvr_800.GASP.15y.x.wb.tim
- J1600-3053.Rcvr_800.GUPPI.15y.x.wb.tim

free-params: [PX, ELONG, ELAT, PMELONG, PMELAT, F0, F1, PB, A1, A1DOT, ECC, T0, OM,
  M2, SINI, JUMP1, DMJUMP1, DMJUMP2]
free-dmx: Yes
toa-type: WB
fitter: WidebandDownhillFitter
n-iterations: 20
ephem: DE440
bipm: BIPM2019

dmx:  # control dmx windowing/fixing
  ignore-dmx: false
  fratio: 1.1
  max-sw-delay: 0.1 # finer binning when solar wind delay > threshold (us)
  custom-dmx: [] # designated by [mjd_low,mjd_hi,binsize]

intermediate-results: # use results from previous runs
  no-corner: true
  noise-dir: ../15yr-intermediate/20230131.Noise.wb.2868fa95/
  excised-tim: /nanograv/share/15yr/timing/intermediate/20220913.Outlier.wb.281b67cb/J1600-3053gbt.wb/J1600-3053gbt.wb_excise.tim
  compare-noise-dir: /nanograv/share/15yr/timing/intermediate/20230125.Noise.wb.4b355601/ #/nanograv/share/15yr/timing/intermediate/20211108.Noise.wb.e79223b/
ignore: # toa excision
  mjd-start:
  mjd-end: 59072.0
  snr-cut: 25
  bad-range:
  bad-file:
check:  # check before final
  toa-outliers:
  dmx-outliers:
  unusual-params:
  other:
  cleared: true

