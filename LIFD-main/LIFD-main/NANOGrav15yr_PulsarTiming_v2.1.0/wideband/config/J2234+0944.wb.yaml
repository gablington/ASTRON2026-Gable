  no-corner: true
ignore: # toa excision
  mjd-start:
  mjd-end: 59072.0
  snr-cut: 25
  bad-range:
  - [57984, 58447, PUPPI]
  bad-file:
  - [puppi_57053_J2234+0944_0750.15y.x.ff, snr]
  - [puppi_57937_J2234+0944_0204.15y.x.ff, unknown]
  - [puppi_58880_J2234+0944_0932.15y.x.ff, non-detection]

check:  # check before final
  toa-outliers:
  dmx-outliers:
  unusual-params:
  other:
  cleared: true
