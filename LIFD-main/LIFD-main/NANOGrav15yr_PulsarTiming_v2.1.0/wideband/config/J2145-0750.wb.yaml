intermediate-results: # use results from previous runs
  noise-dir: /nanograv/share/15yr/timing/intermediate/20230222.Noise.wb.temp/
  compare-noise-dir: /nanograv/share/15yr/timing/intermediate/20230131.Noise.wb.2868fa95/
