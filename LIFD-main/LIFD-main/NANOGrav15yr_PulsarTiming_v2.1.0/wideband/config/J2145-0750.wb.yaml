  no-corner: true

ignore: # toa excision
  mjd-start:
  mjd-end: 59072.0
  snr-cut: 25
  bad-range:
  bad-file:
  - [guppi_57194_J2145-0750_0038.15y.x.ff, rfi]
  - [guppi_57229_J2145-0750_0032.15y.x.ff, rfi]

check:  # check before final
  toa-outliers:
  dmx-outliers:
  unusual-params:
  other:
