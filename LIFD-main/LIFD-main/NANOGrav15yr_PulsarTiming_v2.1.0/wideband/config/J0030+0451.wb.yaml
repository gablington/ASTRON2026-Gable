source: J0030+0451
par-directory: results/
tim-directory: /nanograv/timing/releases/15y/toagen/releases/2021.08.25-9d8d617/
timing-model: J0030+0451_PINT_20230131.wb.par
compare-model: archive/J0030+0451_PINT_20230125.wb.par
toas:
- J0030+0451.430.ASP.15y.x.wb.tim
- J0030+0451.430.PUPPI.15y.x.wb.tim
- J0030+0451.L-wide.ASP.15y.x.wb.tim
- J0030+0451.L-wide.PUPPI.15y.x.wb.tim
- J0030+0451.S-wide.PUPPI.15y.x.wb.tim

free-params: [PX, ELONG, ELAT, PMELONG, PMELAT, F0, F1, JUMP1, JUMP2, DMJUMP1, DMJUMP2,
  DMJUMP3]
free-dmx: Yes
toa-type: WB
fitter: WidebandDownhillFitter
n-iterations: 20
ephem: DE440
bipm: BIPM2019

dmx:  # control dmx windowing/fixing
  ignore-dmx: false
  fratio: 1.1
  max-sw-delay: 0.1 # finer binning when solar wind delay > threshold (us)
  custom-dmx: [] # designated by [mjd_low,mjd_hi,binsize]

intermediate-results: # use results from previous runs
  noise-dir: ../15yr-intermediate/20230131.Noise.wb.2868fa95/
  compare-noise-dir: /nanograv/share/15yr/timing/intermediate/20230125.Noise.wb.4b355601/
  excised-tim: /nanograv/share/15yr/timing/intermediate/20220913.Outlier.wb.281b67cb/J0030+0451.wb/J0030+0451.wb_excise.tim
  no-corner: true
ignore: # toa excision
  mjd-start:
  mjd-end: 59072.0
  snr-cut: 25
  bad-range:
  - [57984, 58447, PUPPI]
  bad-file:
  - [54925.000039.3.000.000.15y.x.ff, unknown]
  - [puppi_57115_J0030+0451_0562.15y.x.ff, unknown]
  - [puppi_58937_J0030+0451_0496.15y.x.ff, unknown]
  - [puppi_58936_J0030+0451_0472.15y.x.ff, unknown]
  - [puppi_56380_0030+0451_0584.15y.x.ff, unknown]
  - [puppi_58565_J0030+0451_0066.15y.x.ff, unknown]
  - [puppi_58945_J0030+0451_0697.15y.x.ff, unknown]
  - [puppi_56558_J0030+0451_0367.15y.x.ff, unknown]

check:  # check before final
  toa-outliers:
  dmx-outliers:
  unusual-params:
  other:
  cleared: true
