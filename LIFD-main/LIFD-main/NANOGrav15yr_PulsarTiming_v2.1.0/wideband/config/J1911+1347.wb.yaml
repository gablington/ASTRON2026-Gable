  no-corner: true
ignore: # toa excision
  orphaned-rec:
  - L-wide_ASP
  - 430_ASP
  mjd-start:
  mjd-end: 59072.0
  snr-cut: 25
  bad-range:
  - [57984, 58447, PUPPI]
  bad-file:
check:  # check before final
  toa-outliers:
  dmx-outliers:
  unusual-params:
  other:
  cleared: true

