source: J2214+3000
par-directory: results/
tim-directory: /nanograv/timing/releases/15y/toagen/releases/2021.08.25-9d8d617/
timing-model: J2214+3000_PINT_20230131.wb.par
compare-model: archive/J2214+3000_PINT_20230125.wb.par
toas:
- J2214+3000.L-wide.ASP.15y.x.wb.tim
- J2214+3000.L-wide.PUPPI.15y.x.wb.tim
- J2214+3000.S-wide.ASP.15y.x.wb.tim
- J2214+3000.S-wide.PUPPI.15y.x.wb.tim

free-params: [PX, ELONG, ELAT, PMELONG, PMELAT, F0, F1, A1, FB0, FB1, FB2, FB3, FD1,
  FD2, FD3, FD4, TASC, EPS1, EPS2, JUMP1, DMJUMP1, DMJUMP2]
free-dmx: Yes
toa-type: WB
fitter: WidebandDownhillFitter
n-iterations: 20
ephem: DE440
bipm: BIPM2019

dmx:  # control dmx windowing/fixing
  ignore-dmx: false
  fratio: 1.1
  max-sw-delay: 0.1 # finer binning when solar wind delay > threshold (us)
  custom-dmx: [] # designated by [mjd_low,mjd_hi,binsize]

intermediate-results: # use results from previous runs
  noise-dir: ../15yr-intermediate/20230131.Noise.wb.2868fa95/
