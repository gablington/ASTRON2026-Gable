  no-corner: true
ignore: # toa excision
  mjd-start:
  mjd-end: 59072.0
  snr-cut: 25
  bad-range:
  - [57984, 58447, PUPPI]
  bad-file:
  - [puppi_58893_J2214+3000_0155.15y.x.ff, snr]
  - [puppi_56346_2214+3000_0260.15y.x.ff, snr]
  - [puppi_58528_J2214+3000_1645.15y.x.ff, non-detection]

check:  # check before final
  toa-outliers:
  dmx-outliers:
  unusual-params:
  other:
  cleared: true 

