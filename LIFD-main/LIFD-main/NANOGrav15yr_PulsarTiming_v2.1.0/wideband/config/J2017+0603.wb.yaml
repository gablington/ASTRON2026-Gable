source: J2017+0603
par-directory: results/
tim-directory: /nanograv/timing/releases/15y/toagen/releases/2021.08.25-9d8d617/
timing-model: J2017+0603_PINT_20230131.wb.par
compare-model: archive/J2017+0603_PINT_20230125.wb.par
