  no-corner: true
ignore: # toa excision
  mjd-start:
  mjd-end: 59072.0
  snr-cut: 25
  bad-range:
  - [57984, 58447, PUPPI]
  bad-file:
  - [puppi_57958_J2017+0603_0383.15y.x.ff, snr]
  - [puppi_57223_J2017+0603_2176.15y.x.ff, snr]

check:  # check before final
  toa-outliers:
  dmx-outliers:
  unusual-params:
  other:
  cleared: true
