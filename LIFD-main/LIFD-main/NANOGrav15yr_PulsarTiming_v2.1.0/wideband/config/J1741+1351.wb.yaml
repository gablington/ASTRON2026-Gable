free-params:
- PX
- ELONG
- ELAT
- PMELONG
- PMELAT
- F0
- F1
- PB
- PBDOT
- A1
- A1DOT
- M2
- SINI
- TASC
- EPS1
- EPS2
- JUMP1
- DMJUMP1
- DMJUMP2
free-dmx: Yes
toa-type: WB
fitter: WidebandDownhillFitter
