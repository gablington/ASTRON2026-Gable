source: J1741+1351
par-directory: results/
tim-directory: /nanograv/timing/releases/15y/toagen/releases/2021.08.25-9d8d617/
timing-model: J1741+1351_PINT_20230131.wb.par
compare-model: archive/J1741+1351_PINT_20230125.wb.par
