  mjd-start:
  mjd-end: 59072.0
  snr-cut: 25
  bad-range:
  - [57984, 58447, PUPPI]
  bad-file:
  - [guppi_55976_B1937+21_0018.15y.x.ff]
  - [puppi_56755_B1937+21_0643.15y.x.ff]
  - [puppi_56970_B1937+21_0798.15y.x.ff]

check:  # check before final
  toa-outliers:
  dmx-outliers:
  unusual-params:
  other:
  cleared: true 

