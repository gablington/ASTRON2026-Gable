source: J1024-0719
par-directory: results/
tim-directory: /nanograv/timing/releases/15y/toagen/releases/2021.08.25-9d8d617/
timing-model: J1024-0719_PINT_20220302.nb.par
compare-model: archive/J1024-0719_PINT_20220223.nb.par
