  no-corner: true
ignore: # toa excision
  orphaned-rec:
  - S-wide_PUPPI
  mjd-start:
  mjd-end: 59072.0
  snr-cut: 8
  bad-toa:
  - [puppi_58739_J2229+2643_0151.15y.x.ff, 4, 0, snr]
