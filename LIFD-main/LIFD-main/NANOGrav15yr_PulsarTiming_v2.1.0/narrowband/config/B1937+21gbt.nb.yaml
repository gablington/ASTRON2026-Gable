source: B1937+21gbt
par-directory: results/
tim-directory: /nanograv/timing/releases/15y/toagen/releases/2021.08.25-9d8d617/
timing-model: B1937+21gbt_PINT_20220304.nb.par
compare-model: archive/B1937+21gbt_PINT_20220301.nb.par
toas:
- B1937+21.Rcvr1_2.GASP.15y.x.nb.tim
- B1937+21.Rcvr1_2.GUPPI.15y.x.nb.tim
- B1937+21.Rcvr_800.GASP.15y.x.nb.tim
- B1937+21.Rcvr_800.GUPPI.15y.x.nb.tim

free-params: [PX, ELONG, ELAT, PMELONG, PMELAT, F0, F1, FD1, FD2, FD3, FD4, JUMP1]
free-dmx: Yes
toa-type: NB
fitter: DownhillGLSFitter
n-iterations: 20
ephem: DE440
bipm: BIPM2019

dmx:  # control dmx windowing/fixing
  ignore-dmx: false
  fratio: 1.1
  max-sw-delay: 0.1 # finer binning when solar wind delay > threshold (us)
  custom-dmx: [] # designated by [mjd_low,mjd_hi,binsize]
outlier: # control outlier analysis runs
  method: gibbs
  n-burn: 1000
  n-samples: 20000

intermediate-results: # use results from previous runs
  no-corner: true
  noise-dir: /nanograv/share/15yr/timing/intermediate/20220304.Noise.nb.0516a75/
  excised-tim: /nanograv/share/15yr/timing/intermediate/20220209.Outlier.nb.3460db7/B1937+21gbt.nb/B1937+21gbt.nb_excise.tim
  compare-noise-dir: /nanograv/share/15yr/timing/intermediate/20220301.Noise.nb.ac12e98/
ignore: # toa excision
  orphaned-rec:
  mjd-start:
  mjd-end: 59072.0
  snr-cut: 8
  bad-toa: # designated by [name,chan,subint]
  - [guppi_55305_B1937+21_0003.15y.x.ff, 6, 0, rfi]
  - [guppi_55305_B1937+21_0003.15y.x.ff, 8, 0, rfi]
  - [guppi_55305_B1937+21_0003.15y.x.ff, 10, 0, rfi]
  - [guppi_55275_B1937+21_0003.15y.x.ff, 4, 0, rfi]
  - [guppi_55275_B1937+21_0003.15y.x.ff, 7, 0, rfi]
  - [guppi_55275_B1937+21_0003.15y.x.ff, 14, 0, rfi]
  - [guppi_55305_B1937+21_0003.15y.x.ff, 5, 0, rfi]
  - [guppi_55305_B1937+21_0003.15y.x.ff, 13, 0, rfi]
  - [guppi_55275_B1937+21_0003.15y.x.ff, 10, 0, rfi]
  - [guppi_55275_B1937+21_0003.15y.x.ff, 11, 0, rfi]
  bad-range:
  bad-file:
  # - [guppi_55307_B1937+21_0003.15y.x.ff, non-detection]
  - [guppi_55275_B1937+21_0003.15y.x.ff, non-detection]
  # - [guppi_55337_B1937+21_0003.15y.x.ff, non-detection]
  - [guppi_55305_B1937+21_0003.15y.x.ff, non-detection]
  # - [guppi_55977_B1937+21_0018.15y.x.ff, unknown]
  prob-outlier: 0.1

check:  # check before final
  toa-outliers:
  dmx-outliers:
  unusual-params:
  other:
  cleared: true

changelog:
- '2021-10-26 joe.swiggum INIT: YAML copied/modified version of B1937+21.nb.yaml'
- '2021-10-26 joe.swiggum NOTE: this YAML is for telescope-specific analysis (gbt)'
- '2022-02-07 joe.swiggum NOTE: reduced chi2 now close to 1.0, fixed PINT/enterprise
  EQUAD conversion'
- '2022-02-08 joe.swiggum REMOVE: FD5 due to F-test significance'
- '2022-02-08 joe.swiggum NOTE: bad-file reasons added; non-detection in lowest freq
  part of band'
- '2022-03-08 joe.swiggum READY_FOR: v1.1'
