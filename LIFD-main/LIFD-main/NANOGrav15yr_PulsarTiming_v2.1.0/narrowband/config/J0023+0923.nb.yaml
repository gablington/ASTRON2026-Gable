source: J0023+0923
par-directory: results/
tim-directory: /nanograv/timing/releases/15y/toagen/releases/2021.08.25-9d8d617/
timing-model: J0023+0923_PINT_20220301.nb.par
compare-model: archive/J0023+0923_PINT_20220223.nb.par
toas:
- J0023+0923.430.ASP.15y.x.nb.tim
- J0023+0923.430.PUPPI.15y.x.nb.tim
- J0023+0923.L-wide.ASP.15y.x.nb.tim
- J0023+0923.L-wide.PUPPI.15y.x.nb.tim
- J0023+0923.Rcvr1_2.GUPPI.15y.x.nb.tim
- J0023+0923.S-wide.ASP.15y.x.nb.tim
- J0023+0923.S-wide.PUPPI.15y.x.nb.tim

free-params: [PX, ELONG, ELAT, PMELONG, PMELAT, F0, F1, A1, FB0, TASC, EPS1, EPS2,
  FB1, FB2, FB3, FB4, FB5, FD1, FD2, FD3, FD4, JUMP1]
free-dmx: Yes
toa-type: NB
fitter: DownhillGLSFitter
n-iterations: 20
ephem: DE440
bipm: BIPM2019

dmx:  # control dmx windowing/fixing
  ignore-dmx: false
  fratio: 1.1
  max-sw-delay: 0.1 # finer binning when solar wind delay > threshold (us)
  custom-dmx: [] # designated by [mjd_low,mjd_hi,binsize]
outlier: # control outlier analysis runs
  method: gibbs
  n-burn: 1000
  n-samples: 20000

intermediate-results: # use results from previous runs
  noise-dir: /nanograv/share/15yr/timing/intermediate/20220301.Noise.nb.ac12e98/
  excised-tim: /nanograv/share/15yr/timing/intermediate/20220209.Outlier.nb.3460db7/J0023+0923.nb/J0023+0923.nb_excise.tim
  compare-noise-dir: /nanograv/share/15yr/timing/intermediate/20220222.Noise.nb.4e07003/
  no-corner: true
ignore: # toa excision
  orphaned-rec:
  - S-wide_ASP
  - S-wide_PUPPI
  - Rcvr1_2_GUPPI
  mjd-start:
  mjd-end: 59072.0
  snr-cut: 8
  bad-toa:
  - [puppi_57522_J0023+0923_0086.15y.x.ff, 36, 2, snr]
  - [puppi_57375_J0023+0923_5097.15y.x.ff, 42, 2, snr]
  - [puppi_57375_J0023+0923_5097.15y.x.ff, 36, 4, snr]
  bad-range:
  - [57984, 58447, PUPPI]
  bad-file:
  prob-outlier: 0.1

check:  # check before final
  toa-outliers:
  dmx-outliers:
  - [57200.4, L-band only]
  - [58831.0, missing ~75% of band at 430 MHz (possible gpu failure)]
  - [58964.6, missing ~75% of band at 430 MHz (possible gpu failure)]
  unusual-params:
  other:
  cleared: true

