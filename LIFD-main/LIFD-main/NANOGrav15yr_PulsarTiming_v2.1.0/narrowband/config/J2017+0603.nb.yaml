source: J2017+0603
par-directory: results/
tim-directory: /nanograv/timing/releases/15y/toagen/releases/2021.08.25-9d8d617/
timing-model: J2017+0603_PINT_20220302.nb.par
compare-model: archive/J2017+0603_PINT_20220223.nb.par
toas:
- J2017+0603.430.PUPPI.15y.x.nb.tim
- J2017+0603.L-wide.ASP.15y.x.nb.tim
- J2017+0603.L-wide.PUPPI.15y.x.nb.tim
- J2017+0603.S-wide.ASP.15y.x.nb.tim
- J2017+0603.S-wide.PUPPI.15y.x.nb.tim

free-params: [PX, ELONG, ELAT, PMELONG, PMELAT, F0, F1, PB, A1, M2, SINI, TASC, EPS1,
  EPS2, JUMP1, JUMP2]
free-dmx: Yes
toa-type: NB
fitter: DownhillGLSFitter
n-iterations: 20
ephem: DE440
bipm: BIPM2019

dmx:  # control dmx windowing/fixing
  ignore-dmx: false
  fratio: 1.1
  max-sw-delay: 0.1 # finer binning when solar wind delay > threshold (us)
  custom-dmx: [] # designated by [mjd_low,mjd_hi,binsize]
outlier: # control outlier analysis runs
  method: gibbs
  n-burn: 1000
  n-samples: 20000

intermediate-results: # use results from previous runs
  noise-dir: /nanograv/share/15yr/timing/intermediate/20220301.Noise.nb.ac12e98/
  compare-noise-dir: /nanograv/share/15yr/timing/intermediate/20220222.Noise.nb.4e07003/
  excised-tim: /nanograv/share/15yr/timing/intermediate/20220209.Outlier.nb.3460db7/J2017+0603.nb/J2017+0603.nb_excise.tim
  no-corner: true
ignore: # toa excision
  mjd-start:
  mjd-end: 59072.0
  snr-cut: 8
  bad-toa:
  - [puppi_57069_J2017+0603_1011.15y.x.ff, 12, 0, non-detection]
  - [puppi_57032_J2017+0603_0446.15y.x.ff, 12, 0, non-detection]
  - [puppi_57565_J2017+0603_0524.15y.x.ff, 43, 0, snr]
  - [puppi_57018_J2017+0603_0259.15y.x.ff, 12, 0, non-detection]
  bad-range:
  - [57984, 58447, PUPPI]
  bad-file:
  prob-outlier: 0.1

check:  # check before final
  toa-outliers:
  dmx-outliers:
  - [56619.9, 'Only S-band, likely gpu failure']
  - [58964.5, L-band low snr]
  unusual-params:
  other:
  cleared: true

