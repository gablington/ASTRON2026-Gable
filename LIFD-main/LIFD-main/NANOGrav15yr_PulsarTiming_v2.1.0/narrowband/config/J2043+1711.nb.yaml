source: J2043+1711
par-directory: results/
tim-directory: /nanograv/timing/releases/15y/toagen/releases/2021.08.25-9d8d617/
timing-model: J2043+1711_PINT_20220302.nb.par
compare-model: archive/J2043+1711_PINT_20220223.nb.par
toas:
- J2043+1711.430.ASP.15y.x.nb.tim
- J2043+1711.430.PUPPI.15y.x.nb.tim
- J2043+1711.L-wide.ASP.15y.x.nb.tim
- J2043+1711.L-wide.PUPPI.15y.x.nb.tim

free-params: [PX, ELONG, ELAT, PMELONG, PMELAT, F0, F1, PB, PBDOT, A1, M2, SINI, TASC,
  EPS1, EPS2, FD1, FD2, JUMP1]
free-dmx: Yes
toa-type: NB
fitter: DownhillGLSFitter
n-iterations: 20
ephem: DE440
bipm: BIPM2019

dmx:  # control dmx windowing/fixing
  ignore-dmx: false
  fratio: 1.1
  max-sw-delay: 0.1 # finer binning when solar wind delay > threshold (us)
  custom-dmx: [] # designated by [mjd_low,mjd_hi,binsize]
outlier: # control outlier analysis runs
  method: gibbs
  n-burn: 1000
  n-samples: 20000

intermediate-results: # use results from previous runs
  noise-dir: /nanograv/share/15yr/timing/intermediate/20220301.Noise.nb.ac12e98/
  compare-noise-dir: /nanograv/share/15yr/timing/intermediate/20220222.Noise.nb.4e07003/
  excised-tim: /nanograv/share/15yr/timing/intermediate/20220209.Outlier.nb.3460db7/J2043+1711.nb/J2043+1711.nb_excise.tim
  no-corner: true
ignore: # toa excision
  mjd-start:
  mjd-end: 59072.0
  snr-cut: 8
  bad-toa:
  - [puppi_57937_J2043+1711_0200.15y.x.ff, 20, 0, snr]
  - [puppi_57937_J2043+1711_0200.15y.x.ff, 22, 0, snr]
  - [puppi_57937_J2043+1711_0200.15y.x.ff, 45, 0, snr]
  - [puppi_57937_J2043+1711_0200.15y.x.ff, 21, 0, snr]
  - [puppi_57937_J2043+1711_0200.15y.x.ff, 23, 0, snr]
  - [puppi_57937_J2043+1711_0200.15y.x.ff, 36, 0, snr]
  - [puppi_57937_J2043+1711_0200.15y.x.ff, 37, 0, snr]
  - [puppi_58902_J2043+1711_0093.15y.x.ff, 2, 0, non-detection]
  bad-range:
  - [57984, 58447, PUPPI]
  bad-file:
  prob-outlier: 0.1

check:  # check before final
  toa-outliers:
  dmx-outliers:
  - [57920.23, 'low snr in L-band; only ~20 MHz of usuable data at 430, GPU failure?']
  unusual-params:
  other:
  cleared: true

