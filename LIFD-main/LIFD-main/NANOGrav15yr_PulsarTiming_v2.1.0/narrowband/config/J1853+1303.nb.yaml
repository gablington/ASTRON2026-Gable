  no-corner: true
ignore: # toa excision
  mjd-start:
  mjd-end: 59072.0
  snr-cut: 8
  bad-toa:
  - [puppi_57627_J1853+1303_1071.15y.x.ff, 20, 0, rfi]
  - [puppi_58765_J1853+1303_0337.15y.x.ff, 40, 0, rfi]
  - [puppi_57978_J1853+1303_0208.15y.x.ff, 41, 0, few_chans]
  - [puppi_57326_J1853+1303_4296.15y.x.ff, 41, 0, few_chans]
  bad-range:
  - [57984, 58447, PUPPI]
  bad-file:
  prob-outlier: 0.1

check:  # check before final
  toa-outliers:
  dmx-outliers:
  unusual-params:
  other:
  cleared: true
