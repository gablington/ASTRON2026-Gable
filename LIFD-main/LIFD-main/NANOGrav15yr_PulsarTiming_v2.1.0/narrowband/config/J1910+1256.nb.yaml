source: J1910+1256
par-directory: results/
tim-directory: /nanograv/timing/releases/15y/toagen/releases/2021.08.25-9d8d617/
timing-model: J1910+1256_PINT_20220301.nb.par
compare-model: archive/J1910+1256_PINT_20220222.nb.par
toas:
- J1910+1256.430.PUPPI.15y.x.nb.tim
- J1910+1256.L-wide.ASP.15y.x.nb.tim
- J1910+1256.L-wide.PUPPI.15y.x.nb.tim
- J1910+1256.S-wide.ASP.15y.x.nb.tim
- J1910+1256.S-wide.PUPPI.15y.x.nb.tim
free-params: [PX, ELONG, ELAT, PMELONG, PMELAT, F0, F1, FD1, FD2, PB, A1, A1DOT, T0,
  OM, ECC, JUMP1] # parameters not included here will be frozen
free-dmx: Yes
toa-type: NB
fitter: DownhillGLSFitter
n-iterations: 20
ephem: DE440
bipm: BIPM2019

dmx:  # control dmx windowing/fixing
  ignore-dmx: false
  fratio: 1.1
  max-sw-delay: 0.1 # finer binning when solar wind delay > threshold (us)
  custom-dmx: [] # designated by [mjd_low,mjd_hi,binsize]
outlier: # control outlier analysis runs
  method: gibbs
  n-burn: 1000
  n-samples: 20000
intermediate-results: # use results from previous runs
  noise-dir: /nanograv/share/15yr/timing/intermediate/20220301.Noise.nb.ac12e98/
  compare-noise-dir: /nanograv/share/15yr/timing/intermediate/20220222.Noise.nb.4e07003/
  excised-tim: /nanograv/share/15yr/timing/intermediate/20220209.Outlier.nb.3460db7/J1910+1256.nb/J1910+1256.nb_excise.tim
  no-corner: true
ignore: # toa excision
  orphaned-rec:
  - 430_PUPPI
  mjd-start:
  mjd-end: 59072.0
  snr-cut: 8
  bad-toa:
  - [puppi_57106_J1910+1256_0431.15y.x.ff, 26, 0, rfi]
  - [puppi_58839_J1910+1256_0715.15y.x.ff, 21, 0, few_chans]
  - [puppi_57144_J1910+1256_1149.15y.x.ff, 27, 0, rfi]
  - [puppi_57106_J1910+1256_0431.15y.x.ff, 21, 0, rfi]
  bad-range:
  - [57984, 58447, PUPPI]
  bad-file:
  prob-outlier: 0.1

check:  # check before final
  toa-outliers:
  dmx-outliers:
  unusual-params:
  other:
  cleared: true

