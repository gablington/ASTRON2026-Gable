source: J1600-3053gbt
par-directory: results/
tim-directory: /nanograv/timing/releases/15y/toagen/releases/2021.08.25-9d8d617/
timing-model: J1600-3053gbt_PINT_20220302.nb.par
compare-model: archive/J1600-3053gbt_PINT_20220223.nb.par
toas:
- J1600-3053.Rcvr1_2.GASP.15y.x.nb.tim
- J1600-3053.Rcvr1_2.GUPPI.15y.x.nb.tim
- J1600-3053.Rcvr_800.GASP.15y.x.nb.tim
- J1600-3053.Rcvr_800.GUPPI.15y.x.nb.tim

free-params: [PX, ELONG, ELAT, PMELONG, PMELAT, F0, F1, PB, A1, A1DOT, ECC, T0, OM,
  M2, SINI, OMDOT, JUMP1, FD1, FD2]
free-dmx: Yes
toa-type: NB
fitter: DownhillGLSFitter
n-iterations: 20
ephem: DE440
bipm: BIPM2019

dmx:  # control dmx windowing/fixing
  ignore-dmx: false
  fratio: 1.1
  max-sw-delay: 0.1 # finer binning when solar wind delay > threshold (us)
  custom-dmx: [] # designated by [mjd_low,mjd_hi,binsize]
outlier: # control outlier analysis runs
  method: gibbs
  n-burn: 1000
  n-samples: 20000

intermediate-results: # use results from previous runs
  noise-dir: /nanograv/share/15yr/timing/intermediate/20220301.Noise.nb.ac12e98/
  excised-tim: /nanograv/share/15yr/timing/intermediate/20220209.Outlier.nb.3460db7/J1600-3053gbt.nb/J1600-3053gbt.nb_excise.tim
  no-corner: true
  compare-noise-dir: /nanograv/share/15yr/timing/intermediate/20220222.Noise.nb.4e07003/
ignore: # toa excision
  mjd-start:
  mjd-end: 59072.0
  snr-cut: 8
  bad-toa:
  bad-range:
  bad-file:
  prob-outlier: 0.1

check:  # check before final
  toa-outliers:
  dmx-outliers:
  unusual-params:
  other:
  cleared: true

changelog:
- '2021-10-13 joe.swiggum INIT: YAML copied/modified version of J1600-3053.nb.yaml'
- '2021-10-13 joe.swiggum NOTE: this YAML is for telescope-specific analysis (gbt)'
- '2021-10-14 joe.swiggum REMOVE: FD3 due to F-test significance'
- '2021-11-03 joe.swiggum CURATE: new outlier results, no manual cuts to inspect'
- '2022-03-08 joe.swiggum READY_FOR: v1.1'
