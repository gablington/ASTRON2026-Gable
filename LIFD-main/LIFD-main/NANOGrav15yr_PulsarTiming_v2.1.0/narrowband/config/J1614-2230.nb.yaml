  no-corner: true
ignore: # toa excision
  mjd-start:
  mjd-end: 59072.0
  snr-cut: 8
  bad-toa:
  - [guppi_57947_J1614-2230_0006.15y.x.ff, 61, 0, snr]
  - [guppi_55278_J1614-2230_0003.15y.x.ff, 20, 0, snr]
  - [guppi_55269_1614-2230_0001.15y.x.ff, 53, 6, rfi]
  - [guppi_55269_1614-2230_0001.15y.x.ff, 45, 10, rfi]
  bad-range:
  bad-file:
  - [guppi_55893_J1614-2230_0020.15y.x.ff, snr]
  prob-outlier: 0.1

check:  # check before final
  toa-outliers:
  dmx-outliers:
  unusual-params:
  other:
  cleared: true

