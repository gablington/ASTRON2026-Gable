source: J0509+0856
par-directory: results/
tim-directory: /nanograv/timing/releases/15y/toagen/releases/2021.08.25-9d8d617/
timing-model: J0509+0856_PINT_20220302.nb.par
compare-model: archive/J0509+0856_PINT_20220223.nb.par
toas:
- J0509+0856.L-wide.PUPPI.15y.x.nb.tim
- J0509+0856.S-wide.PUPPI.15y.x.nb.tim

free-params: [ELONG, ELAT, PMELONG, PMELAT, PX, F0, F1, A1, PB, TASC, EPS1, EPS2,
  JUMP1]
free-dmx: Yes
toa-type: NB
fitter: DownhillGLSFitter
n-iterations: 20
ephem: DE440
bipm: BIPM2019

dmx:  # control dmx windowing/fixing
  ignore-dmx: false
  fratio: 1.1
  max-sw-delay: 0.1 # finer binning when solar wind delay > threshold (us)
  custom-dmx: [] # designated by [mjd_low,mjd_hi,binsize]
outlier: # control outlier analysis runs
  method: gibbs
  n-burn: 1000
  n-samples: 20000

intermediate-results: # use results from previous runs
  noise-dir: /nanograv/share/15yr/timing/intermediate/20220301.Noise.nb.ac12e98/
  compare-noise-dir: /nanograv/share/15yr/timing/intermediate/20220222.Noise.nb.4e07003/
  excised-tim: /nanograv/share/15yr/timing/intermediate/20220209.Outlier.nb.3460db7/J0509+0856.nb/J0509+0856.nb_excise.tim
  no-corner: true
ignore: # toa excision
  mjd-start:
  mjd-end: 59072.0
  snr-cut: 8
  bad-toa:
  - [puppi_58883_J0509+0856_1005.15y.x.ff, 32, 0, snr]
  - [puppi_58566_J0509+0856_0140.15y.x.ff, 44, 0, snr]
  - [puppi_59026_J0509+0856_0414.15y.x.ff, 21, 0, snr]
  bad-file:
  bad-range:
  - [57984, 58447, PUPPI]
  prob-outlier: 0.1

check:  # check before final
  toa-outliers:
  dmx-outliers:
  - [57937.6, '1.5 & 2 GHz only, both bands messy (possibly RFI + scintillation)']
  unusual-params:
  other:
  cleared: true

