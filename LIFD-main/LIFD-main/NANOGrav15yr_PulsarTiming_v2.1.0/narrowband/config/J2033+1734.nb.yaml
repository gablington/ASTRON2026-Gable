source: J2033+1734
par-directory: results/
tim-directory: /nanograv/timing/releases/15y/toagen/releases/2021.08.25-9d8d617/
timing-model: J2033+1734_PINT_20220304.nb.par
compare-model: archive/J2033+1734_PINT_20220302.nb.par
toas:
- J2033+1734.327.PUPPI.15y.x.nb.tim
- J2033+1734.430.PUPPI.15y.x.nb.tim
- J2033+1734.L-wide.PUPPI.15y.x.nb.tim

free-params:
- PX
- ELONG
- ELAT
- PMELONG
- PMELAT
- F0
- F1
- PB
- A1
- ECC
- T0
- OM
- JUMP1
- FD1
- FD2
free-dmx: Yes
toa-type: NB
fitter: DownhillGLSFitter
n-iterations: 20
ephem: DE440
bipm: BIPM2019

dmx:  # control dmx windowing/fixing
  ignore-dmx: false
  fratio: 1.1
  max-sw-delay: 0.1 # finer binning when solar wind delay > threshold (us)
  custom-dmx: [] # designated by [mjd_low,mjd_hi,binsize]
outlier: # control outlier analysis runs
  method: gibbs
  n-burn: 1000
  n-samples: 20000

intermediate-results: # use results from previous runs
  noise-dir: /nanograv/share/15yr/timing/intermediate/20220304.Noise.nb.0516a75/
  excised-tim: /nanograv/share/15yr/timing/intermediate/20220209.Outlier.nb.3460db7/J2033+1734.nb/J2033+1734.nb_excise.tim
  compare-noise-dir: /nanograv/share/15yr/timing/intermediate/20220301.Noise.nb.ac12e98/
  no-corner: true
ignore: # toa excision
  orphaned-rec:
  - 327_PUPPI
  mjd-start:
  mjd-end: 59072.0
  snr-cut: 8
  bad-toa:
  - [puppi_58587_J2033+1734_0125.15y.x.ff, 40, 0, non-detection]
  bad-range:
  - [57984, 58447, PUPPI]
  bad-file:
  prob-outlier: 0.1

check:  # check before final
  toa-outliers:
  dmx-outliers:
  - [57317.978, L-band only]
  - [57649.086, L-band only]
  unusual-params:
  other:
  cleared: true

