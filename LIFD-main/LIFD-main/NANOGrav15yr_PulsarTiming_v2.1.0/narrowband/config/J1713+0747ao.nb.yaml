source: J1713+0747ao
par-directory: results/
tim-directory: /nanograv/timing/releases/15y/toagen/releases/2021.08.25-9d8d617/
timing-model: J1713+0747ao_PINT_20220306.nb.par
compare-model: archive/J1713+0747ao_PINT_20220302.nb.par
