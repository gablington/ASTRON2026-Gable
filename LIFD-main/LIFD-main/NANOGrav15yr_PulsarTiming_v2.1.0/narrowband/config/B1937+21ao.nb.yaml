source: B1937+21ao
par-directory: results/
tim-directory: /nanograv/timing/releases/15y/toagen/releases/2021.08.25-9d8d617/
timing-model: B1937+21ao_PINT_20220304.nb.par
compare-model: archive/B1937+21ao_PINT_20220301.nb.par
toas:
- B1937+21.430.PUPPI.15y.x.nb.tim
- B1937+21.L-wide.ASP.15y.x.nb.tim
- B1937+21.L-wide.PUPPI.15y.x.nb.tim
- B1937+21.S-wide.ASP.15y.x.nb.tim
- B1937+21.S-wide.PUPPI.15y.x.nb.tim

free-params: [PX, ELONG, ELAT, PMELONG, PMELAT, F0, F1, FD1, FD2, FD3, FD4, JUMP1]
free-dmx: Yes
toa-type: NB
fitter: DownhillGLSFitter
n-iterations: 20
ephem: DE440
bipm: BIPM2019

dmx:  # control dmx windowing/fixing
  ignore-dmx: false
  fratio: 1.1
  max-sw-delay: 0.1 # finer binning when solar wind delay > threshold (us)
  custom-dmx: [] # designated by [mjd_low,mjd_hi,binsize]
outlier: # control outlier analysis runs
  method: gibbs
  n-burn: 1000
  n-samples: 20000

intermediate-results: # use results from previous runs
  no-corner: true
  noise-dir: /nanograv/share/15yr/timing/intermediate/20220304.Noise.nb.0516a75/
  excised-tim: /nanograv/share/15yr/timing/intermediate/20220209.Outlier.nb.3460db7/B1937+21ao.nb/B1937+21ao.nb_excise.tim
  compare-noise-dir: /nanograv/share/15yr/timing/intermediate/20220301.Noise.nb.ac12e98/
ignore: # toa excision
  orphaned-rec:
  - 430_PUPPI
  mjd-start:
  mjd-end: 59072.0
  snr-cut: 8
  bad-toa:
  bad-range:
  - [57984, 58447, PUPPI]
  bad-file:
  #- [puppi_57234_B1937+21_2418.15y.x.ff, smeared]
  #- [puppi_56869_B1937+21_0363.15y.x.ff, smeared]
  #- [puppi_56654_B1937+21_0019.15y.x.ff, unknown]
  #- [puppi_58565_B1937+21_0036.15y.x.ff, smeared]
  prob-outlier: 0.1

check:  # check before final
  toa-outliers:
  dmx-outliers:
  unusual-params:
  other:
  cleared: true
changelog:
- '2021-10-26 joe.swiggum INIT: YAML copied/modified version of B1937+21.nb.yaml'
- '2021-10-26 joe.swiggum NOTE: this YAML is for telescope-specific analysis (ao)'
- '2022-02-07 joe.swiggum NOTE: reduced chi2 now close to 1.0, fixed PINT/enterprise
  EQUAD conversion'
- '2022-02-08 joe.swiggum REMOVE: FD5 due to F-test significance'
- '2022-03-08 joe.swiggum READY_FOR: v1.1'
