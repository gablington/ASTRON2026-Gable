source: J1022+1001
par-directory: results/
tim-directory: /nanograv/timing/releases/15y/toagen/releases/2021.08.25-9d8d617/
timing-model: J1022+1001_PINT_20220304.nb.par
compare-model: archive/J1022+1001_PINT_20220301.nb.par
toas:
- J1022+1001.430.PUPPI.15y.x.nb.tim
- J1022+1001.L-wide.PUPPI.15y.x.nb.tim
- J1022+1001.Rcvr1_2.GUPPI.15y.x.nb.tim
- J1022+1001.S-wide.PUPPI.15y.x.nb.tim

free-params: [ELONG, ELAT, PMELONG, PMELAT, PX, F0, F1, A1, PB, T0, E, OM, FD1, FD2,
  FD3, FD4, JUMP1, JUMP2, A1DOT, FD5]
free-dmx: Yes
toa-type: NB
fitter: DownhillGLSFitter
n-iterations: 20
ephem: DE440
bipm: BIPM2019

dmx:  # control dmx windowing/fixing
  ignore-dmx: false
  fratio: 1.1
  max-sw-delay: 0.1 # finer binning when solar wind delay > threshold (us)
  custom-dmx: [] # designated by [mjd_low,mjd_hi,binsize]
outlier: # control outlier analysis runs
  method: gibbs
  n-burn: 1000
  n-samples: 20000

intermediate-results: # use results from previous runs
  noise-dir: /nanograv/share/15yr/timing/intermediate/20220304.Noise.nb.0516a75/
  compare-noise-dir: /nanograv/share/15yr/timing/intermediate/20220301.Noise.nb.ac12e98/
  excised-tim: /nanograv/share/15yr/timing/intermediate/20220209.Outlier.nb.3460db7/J1022+1001.nb/J1022+1001.nb_excise.tim
  no-corner: true
ignore: # toa excision
  mjd-start:
  mjd-end: 59072.0
  snr-cut: 8
  bad-toa:
  bad-range:
  - [57984, 58447, PUPPI]
  bad-file:
  - [guppi_55625_J1022+1001_0003.15y.x.ff, isolated]
  - [guppi_55672_J1022+1001_0005.15y.x.ff, isolated]
  prob-outlier: 0.1

check:  # check before final
  toa-outliers:
  - [puppi_58755_J1022+1001_0124.15y.x.ff, 'outliers resid/unc, whitened; no obvious
      issues']
  - [puppi_58467_J1022+1001_0864.15y.x.ff, 'outliers resid/unc, whitened; no obvious
      issues']
  - [puppi_57808_J1022+1001_0169.15y.x.ff, 'outliers resid/unc, whitened; no obvious
      issues']
  - [puppi_57648_J1022+1001_0052.15y.x.ff, 'outliers resid/unc, whitened; no obvious
      issues']
  - [puppi_57502_J1022+1001_0080.15y.x.ff, 'outliers resid/unc, whitened; no obvious
      issues']
  dmx-outliers:
  - [57627.7, falls right on solar wind cusp]
  - [58482.4, 'missing ~50% band at 2 GHz, high SNR at 2 GHz & 1.4 GHz']
  - [58922.1, 2 GHz missing >50% of band]
  unusual-params:
  - [430_PUPPI_ECORR, 'pushing against prior, but very few TOAs, probably ok']
  other:
  cleared: true

