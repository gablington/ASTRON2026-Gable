  no-corner: true
ignore: # toa excision
  orphaned-rec:
  poor-febe:
  - 6GHz_YUPPI
  mjd-start:
  mjd-end: 59072.0
  snr-cut: 8
  bad-toa:
  - [puppi_57587_J1903+0327_0299.15y.x.ff, 50, 0, non-detection]
  bad-range:
  - [57984, 58447, PUPPI]
  bad-file:
  prob-outlier: 0.1

check:  # check before final
  toa-outliers:
  dmx-outliers:
  unusual-params:
  other:
  cleared: true

