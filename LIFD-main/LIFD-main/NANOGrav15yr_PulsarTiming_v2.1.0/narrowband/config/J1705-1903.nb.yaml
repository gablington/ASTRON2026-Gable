source: J1705-1903
par-directory: results/
tim-directory: /nanograv/timing/releases/15y/toagen/releases/2021.08.25-9d8d617/
timing-model: J1705-1903_PINT_20220307.nb.par
compare-model: archive/J1705-1903_PINT_20220304.nb.par
toas:
- J1705-1903.Rcvr1_2.GUPPI.15y.x.nb.tim
- J1705-1903.Rcvr_800.GUPPI.15y.x.nb.tim

free-params: [ELONG, ELAT, PMELONG, PMELAT, PX, F0, F1, A1, FB0, TASC, FB1, FB2, FB3,
  FB4, EPS1, EPS2, JUMP1, FD1, FD2, FB5]
free-dmx: Yes
toa-type: NB
fitter: DownhillGLSFitter
n-iterations: 20
ephem: DE440
bipm: BIPM2019

dmx:  # control dmx windowing/fixing
  ignore-dmx: false
  fratio: 1.1
  max-sw-delay: 0.1 # finer binning when solar wind delay > threshold (us)
  custom-dmx: [] # designated by [mjd_low,mjd_hi,binsize]

outlier: # control outlier analysis runs
  method: gibbs
  n-burn: 1000
  n-samples: 20000

intermediate-results: # use results from previous runs
  noise-dir: /nanograv/share/15yr/timing/intermediate/20220307.Noise.nb.a7a9dea/
  compare-noise-dir: /nanograv/share/15yr/timing/intermediate/20220304.Noise.nb.0516a75/
  excised-tim: /nanograv/share/15yr/timing/intermediate/20220209.Outlier.nb.3460db7/J1705-1903.nb/J1705-1903.nb_excise.tim
  no-corner: true

ignore: # toa excision
  mjd-start:
  mjd-end: 59072.0
  snr-cut: 8
  bad-toa:
  bad-file:
  prob-outlier: 0.1
  orb-phase-range: [0.1, 0.4]

check:  # check before final
  toa-outliers:
  dmx-outliers:
  unusual-params:
  other:
  cleared: true

