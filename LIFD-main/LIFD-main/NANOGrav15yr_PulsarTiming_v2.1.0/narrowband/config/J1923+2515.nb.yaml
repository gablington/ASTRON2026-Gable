  no-corner: true
ignore: # toa excision
  orphaned-rec:
  - 327_PUPPI
  - S-wide_PUPPI
  - S-wide_ASP
  mjd-start:
  mjd-end: 59072.0
  snr-cut: 8
  prob-outlier: 0.1
  bad-toa:
  - [puppi_58650_J1923+2515_0177.15y.x.ff, 31, 0, rfi]
  bad-range:
  - [57984, 58447, PUPPI]
  bad-file:
  - [puppi_56549_J1923+2515_0188.15y.x.ff, few_chans]
  - [55850.000009.3.000.000.15y.x.ff, unknown]
  - [55934.000005.3.000.000.15y.x.ff, unknown]
  - [55877.000007.3.000.000.15y.x.ff, unknown]

check:  # check before final
  toa-outliers:
  dmx-outliers:
  - [58893.58, 'low snr, L-band only']
  unusual-params:
  other:
  cleared: true

