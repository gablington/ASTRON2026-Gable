source: J1923+2515
par-directory: results/
tim-directory: /nanograv/timing/releases/15y/toagen/releases/2021.08.25-9d8d617/
timing-model: J1923+2515_PINT_20220301.nb.par
compare-model: archive/J1923+2515_PINT_20220223.nb.par
