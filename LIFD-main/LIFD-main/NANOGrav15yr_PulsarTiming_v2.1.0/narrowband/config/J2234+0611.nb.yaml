source: J2234+0611
par-directory: results/
tim-directory: /nanograv/timing/releases/15y/toagen/releases/2021.08.25-9d8d617/
timing-model: J2234+0611_PINT_20220304.nb.par
compare-model: archive/J2234+0611_PINT_20220301.nb.par
toas:
- J2234+0611.430.PUPPI.15y.x.nb.tim
- J2234+0611.L-wide.PUPPI.15y.x.nb.tim
- J2234+0611.S-wide.PUPPI.15y.x.nb.tim

free-params: [PX, ELONG, ELAT, PMELONG, PMELAT, F0, F1, PB, A1, A1DOT, ECC, T0, OM,
  PBDOT, OMDOT, FD1, FD2, JUMP1]
free-dmx: Yes
toa-type: NB
fitter: DownhillGLSFitter
n-iterations: 20
ephem: DE440
bipm: BIPM2019

dmx:  # control dmx windowing/fixing
  ignore-dmx: false
  fratio: 1.1
  max-sw-delay: 0.1 # finer binning when solar wind delay > threshold (us)
  custom-dmx: [] # designated by [mjd_low,mjd_hi,binsize]
outlier: # control outlier analysis runs
  method: gibbs
  n-burn: 1000
  n-samples: 20000

intermediate-results: # use results from previous runs
  noise-dir: /nanograv/share/15yr/timing/intermediate/20220304.Noise.nb.0516a75/
  compare-noise-dir: /nanograv/share/15yr/timing/intermediate/20220301.Noise.nb.ac12e98/
  excised-tim: /nanograv/share/15yr/timing/intermediate/20220209.Outlier.nb.3460db7/J2234+0611.nb/J2234+0611.nb_excise.tim
  no-corner: true
ignore: # toa excision
  orphaned-rec:
  - S-wide_PUPPI
  mjd-start:
  mjd-end: 59072.0
  snr-cut: 8
  bad-toa:
  bad-range:
  - [57984, 58447, PUPPI]
  bad-file:
  prob-outlier: 0.1

check:  # check before final
  toa-outliers:
  dmx-outliers:
  unusual-params:
  other:
  cleared: true

