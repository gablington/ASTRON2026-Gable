source: J1745+1017
par-directory: results/
tim-directory: /nanograv/timing/releases/15y/toagen/releases/2021.08.25-9d8d617/
timing-model: J1745+1017_PINT_20220302.nb.par
compare-model: archive/J1745+1017_PINT_20220222.nb.par
toas:
- J1745+1017.430.PUPPI.15y.x.nb.tim
- J1745+1017.L-wide.PUPPI.15y.x.nb.tim
- J1745+1017.S-wide.PUPPI.15y.x.nb.tim

free-params: [ELONG, ELAT, PMELONG, PMELAT, PX, F0, F1, A1, PB, TASC, EPS1, EPS2,
  JUMP1, FD1]
free-dmx: Yes
toa-type: NB
fitter: DownhillGLSFitter
n-iterations: 20
ephem: DE440
bipm: BIPM2019

dmx:  # control dmx windowing/fixing
  ignore-dmx: false
  fratio: 1.1
  max-sw-delay: 0.1 # finer binning when solar wind delay > threshold (us)
  custom-dmx: [] # designated by [mjd_low,mjd_hi,binsize]
outlier: # control outlier analysis runs
  method: gibbs
  n-burn: 1000
  n-samples: 20000

intermediate-results: # use results from previous runs
  noise-dir: /nanograv/share/15yr/timing/intermediate/20220301.Noise.nb.ac12e98/
  excised-tim: /nanograv/share/15yr/timing/intermediate/20220209.Outlier.nb.3460db7/J1745+1017.nb/J1745+1017.nb_excise.tim
  compare-noise-dir: /nanograv/share/15yr/timing/intermediate/20220222.Noise.nb.4e07003/
  no-corner: true
ignore: # toa excision
  mjd-start:
  mjd-end: 59072.0
  snr-cut: 8
  bad-range:
  - [57984, 58447, PUPPI]
  bad-toa:
  bad-file:
  prob-outlier: 0.1

check:  # check before final
  toa-outliers:
  - [puppi_57915_J1745+1017_0239.15y.x.ff, 'outliers res/unc, whitened; no obvious
      issues, assoc w/ DMX outlier?']
  dmx-outliers:
  - [58776.49, 'low s/n, big chunks zapped in S-band']
  - [58916.84, 'low s/n, big chunks zapped in S-band']
  unusual-params:
  other:
  cleared: true

