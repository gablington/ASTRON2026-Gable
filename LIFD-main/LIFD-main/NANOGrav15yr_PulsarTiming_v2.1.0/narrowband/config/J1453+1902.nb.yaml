source: J1453+1902
par-directory: results/
tim-directory: /nanograv/timing/releases/15y/toagen/releases/2021.08.25-9d8d617/
timing-model: J1453+1902_PINT_20220302.nb.par
compare-model: archive/J1453+1902_PINT_20220223.nb.par
toas:
- J1453+1902.430.ASP.15y.x.nb.tim
- J1453+1902.430.PUPPI.15y.x.nb.tim
- J1453+1902.L-wide.ASP.15y.x.nb.tim
- J1453+1902.L-wide.PUPPI.15y.x.nb.tim
- J1453+1902.S-wide.ASP.15y.x.nb.tim
- J1453+1902.S-wide.PUPPI.15y.x.nb.tim

free-params: [PX, ELONG, ELAT, PMELONG, PMELAT, F0, F1, JUMP1]
free-dmx: Yes
toa-type: NB
fitter: DownhillGLSFitter
n-iterations: 20
ephem: DE440
bipm: BIPM2019

dmx:  # control dmx windowing/fixing
  ignore-dmx: false
  fratio: 1.1
  max-sw-delay: 0.1 # finer binning when solar wind delay > threshold (us)
  custom-dmx: [] # designated by [mjd_low,mjd_hi,binsize]
outlier: # control outlier analysis runs
  method: gibbs
  n-burn: 1000
  n-samples: 20000

intermediate-results: # use results from previous runs
  noise-dir: /nanograv/share/15yr/timing/intermediate/20220301.Noise.nb.ac12e98/
  compare-noise-dir: /nanograv/share/15yr/timing/intermediate/20220222.Noise.nb.4e07003/
  excised-tim: /nanograv/share/15yr/timing/intermediate/20220209.Outlier.nb.3460db7/J1453+1902.nb/J1453+1902.nb_excise.tim
  no-corner: true
ignore: # toa excision
  orphaned-rec:
  - L-wide_ASP
  - 430_ASP
  mjd-start:
  mjd-end: 59072.0
  snr-cut: 8
  bad-toa:
  - [puppi_57809_J1453+1902_0185.15y.x.ff, 21, 0, snr]
  - [puppi_56738_J1453+1902_0323.15y.x.ff, 21, 0, snr]
  - [puppi_57417_J1453+1902_5870.15y.x.ff, 40, 0, snr]
  - [puppi_57137_J1453+1902_0987.15y.x.ff, 7, 0, snr]
  - [puppi_57137_J1453+1902_0987.15y.x.ff, 10, 0, snr]
  - [puppi_57137_J1453+1902_0987.15y.x.ff, 15, 0, snr]
  bad-range:
  - [57984, 58447, PUPPI]
  bad-file:
  prob-outlier: 0.1

check:  # check before final
  toa-outliers:
  dmx-outliers:
  unusual-params:
  - [430_PUPPI_ECORR, 'pushing against the prior; 2/3 TOAs cut, so maybe underlying
      issue']
  other:
  cleared: true

