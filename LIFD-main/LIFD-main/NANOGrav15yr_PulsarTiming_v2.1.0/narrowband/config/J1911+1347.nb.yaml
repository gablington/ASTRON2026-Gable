source: J1911+1347
par-directory: results/
tim-directory: /nanograv/timing/releases/15y/toagen/releases/2021.08.25-9d8d617/
timing-model: J1911+1347_PINT_20220302.nb.par
compare-model: archive/J1911+1347_PINT_20220223.nb.par
toas:
- J1911+1347.327.PUPPI.15y.x.nb.tim
- J1911+1347.430.ASP.15y.x.nb.tim
- J1911+1347.430.PUPPI.15y.x.nb.tim
- J1911+1347.L-wide.ASP.15y.x.nb.tim
- J1911+1347.L-wide.PUPPI.15y.x.nb.tim
- J1911+1347.S-wide.ASP.15y.x.nb.tim
- J1911+1347.S-wide.PUPPI.15y.x.nb.tim

free-params: [PX, ELONG, ELAT, PMELONG, PMELAT, F0, F1, FD1, FD2, JUMP1]
free-dmx: Yes
toa-type: NB
fitter: DownhillGLSFitter
n-iterations: 20
ephem: DE440
bipm: BIPM2019

dmx:  # control dmx windowing/fixing
  ignore-dmx: false
  fratio: 1.1
  max-sw-delay: 0.1 # finer binning when solar wind delay > threshold (us)
  custom-dmx: [] # designated by [mjd_low,mjd_hi,binsize]
outlier: # control outlier analysis runs
  method: gibbs
  n-burn: 1000
  n-samples: 20000

intermediate-results: # use results from previous runs
  noise-dir: /nanograv/share/15yr/timing/intermediate/20220301.Noise.nb.ac12e98/
  compare-noise-dir: /nanograv/share/15yr/timing/intermediate/20220222.Noise.nb.4e07003/
  excised-tim: /nanograv/share/15yr/timing/intermediate/20220209.Outlier.nb.3460db7/J1911+1347.nb/J1911+1347.nb_excise.tim
  no-corner: true
ignore: # toa excision
  orphaned-rec:
  - 327_PUPPI
  - S-wide_ASP
  - S-wide_PUPPI
  - L-wide_ASP
  - 430_ASP
  mjd-start:
  mjd-end: 59072.0
  snr-cut: 8
  bad-toa:
  bad-range:
  - [57984, 58447, PUPPI]
  bad-file:
  prob-outlier: 0.1

check:  # check before final
  toa-outliers:
  dmx-outliers:
  - [56887.06, likely gpu failure]
  - [59007.32, 'no 430, low snr']
  unusual-params:
  other:
  cleared: true

