source: J1012+5307
par-directory: results/
tim-directory: /nanograv/timing/releases/15y/toagen/releases/2021.08.25-9d8d617/
timing-model: J1012+5307_PINT_20220305.nb.par
compare-model: archive/J1012+5307_PINT_20220302.nb.par
