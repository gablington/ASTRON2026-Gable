  EPS1, EPS2, FD1, FD2, FD3, FD4, JUMP1]
free-dmx: Yes
toa-type: NB
fitter: DownhillGLSFitter
n-iterations: 20
ephem: DE440
bipm: BIPM2019

dmx:  # control dmx windowing/fixing
  ignore-dmx: false
  fratio: 1.1
  max-sw-delay: 0.1 # finer binning when solar wind delay > threshold (us)
  custom-dmx: [] # designated by [mjd_low,mjd_hi,binsize]
outlier: # control outlier analysis runs
  method: gibbs
  n-burn: 1000
  n-samples: 20000

intermediate-results: # use results from previous runs
  noise-dir: /nanograv/share/15yr/timing/intermediate/20220304.Noise.nb.0516a75/
  excised-tim: /nanograv/share/15yr/timing/intermediate/20220209.Outlier.nb.3460db7/J1012+5307.nb/J1012+5307.nb_excise.tim
  compare-noise-dir: /nanograv/share/15yr/timing/intermediate/20220301.Noise.nb.ac12e98/
  no-corner: true
ignore: # toa excision
  orphaned-rec:
  - 1.5GHz_YUPPI
  mjd-start:
  mjd-end: 59072.0
  snr-cut: 8
  bad-toa:
  - [guppi_55307_J1012+5307_0003.15y.x.ff, 51, 1, rfi]
  bad-range:
  bad-file:
  prob-outlier: 0.1

check:  # check before final
  toa-outliers:
  dmx-outliers:
  unusual-params:
  other:
  cleared: true

