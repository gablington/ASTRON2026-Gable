source: J1944+0907
par-directory: results/
tim-directory: /nanograv/timing/releases/15y/toagen/releases/2021.08.25-9d8d617/
timing-model: J1944+0907_PINT_20220302.nb.par
compare-model: archive/J1944+0907_PINT_20220222.nb.par
toas:
- J1944+0907.327.ASP.15y.x.nb.tim
- J1944+0907.327.PUPPI.15y.x.nb.tim
- J1944+0907.430.ASP.15y.x.nb.tim
- J1944+0907.430.PUPPI.15y.x.nb.tim
- J1944+0907.L-wide.ASP.15y.x.nb.tim
- J1944+0907.L-wide.PUPPI.15y.x.nb.tim
- J1944+0907.S-wide.ASP.15y.x.nb.tim
- J1944+0907.S-wide.PUPPI.15y.x.nb.tim

free-params: [PX, ELONG, ELAT, PMELONG, PMELAT, F0, F1, FD1, FD2, JUMP1, JUMP2]
free-dmx: Yes
toa-type: NB
fitter: DownhillGLSFitter
n-iterations: 20
ephem: DE440
bipm: BIPM2019

dmx:  # control dmx windowing/fixing
  ignore-dmx: false
  fratio: 1.1
  max-sw-delay: 0.1 # finer binning when solar wind delay > threshold (us)
  custom-dmx: [] # designated by [mjd_low,mjd_hi,binsize]
outlier: # control outlier analysis runs
  method: gibbs
  n-burn: 1000
  n-samples: 20000

intermediate-results: # use results from previous runs
  noise-dir: /nanograv/share/15yr/timing/intermediate/20220301.Noise.nb.ac12e98/
  compare-noise-dir: /nanograv/share/15yr/timing/intermediate/20220222.Noise.nb.4e07003/
  excised-tim: /nanograv/share/15yr/timing/intermediate/20220209.Outlier.nb.3460db7/J1944+0907.nb/J1944+0907.nb_excise.tim
  no-corner: true
ignore: # toa excision
  orphaned-rec:
  - 327_ASP
  - 327_PUPPI
  - S-wide_PUPPI
  mjd-start:
  mjd-end: 59072.0
  snr-cut: 8
  bad-toa:
  bad-range:
  - [57984, 58447, PUPPI]
  bad-file:
  prob-outlier: 0.1

check:  # check before final
  toa-outliers:
  dmx-outliers:
  - [58328.17, Only about 20 MHz of band at 430 remain]
  unusual-params:
  other:
  cleared: true

