source: J1640+2224
par-directory: results/
tim-directory: /nanograv/timing/releases/15y/toagen/releases/2021.08.25-9d8d617/
timing-model: J1640+2224_PINT_20220305.nb.par
compare-model: archive/J1640+2224_PINT_20220302.nb.par
toas:
- J1640+2224.430.ASP.15y.x.nb.tim
- J1640+2224.430.PUPPI.15y.x.nb.tim
- J1640+2224.L-wide.ASP.15y.x.nb.tim
- J1640+2224.L-wide.PUPPI.15y.x.nb.tim
- J1640+2224.S-wide.PUPPI.15y.x.nb.tim

free-params: [PX, ELONG, ELAT, PMELONG, PMELAT, F0, F1, PB, A1, A1DOT, ECC, T0, OM,
  EDOT, M2, SINI, FD1, FD2, FD3, FD4, JUMP1]
free-dmx: Yes
toa-type: NB
fitter: DownhillGLSFitter
n-iterations: 20
ephem: DE440
bipm: BIPM2019

dmx:  # control dmx windowing/fixing
  ignore-dmx: false
  fratio: 1.1
  max-sw-delay: 0.1 # finer binning when solar wind delay > threshold (us)
  custom-dmx: [] # designated by [mjd_low,mjd_hi,binsize]
outlier: # control outlier analysis runs
  method: gibbs
  n-burn: 1000
  n-samples: 20000

intermediate-results: # use results from previous runs
  noise-dir: /nanograv/share/15yr/timing/intermediate/20220305.Noise.nb.0516a75/
  compare-noise-dir: /nanograv/share/15yr/timing/intermediate/20220301.Noise.nb.ac12e98/
  excised-tim: /nanograv/share/15yr/timing/intermediate/20220209.Outlier.nb.3460db7/J1640+2224.nb/J1640+2224.nb_excise.tim
  no-corner: true
ignore: # toa excision
  mjd-start:
  mjd-end: 59072.0
  poor-febe:
  - S-wide_PUPPI
  snr-cut: 8
  bad-toa:
  bad-range:
  - [57984, 58447, PUPPI]
  bad-file:
  prob-outlier: 0.1

check:  # check before final
  toa-outliers:
  - [puppi_57291_J1640+2224_3633.15y.x.ff, 'outliers res/unc, whitened; no obvious
      issues and avg looks ok']
  - [puppi_58845_J1640+2224_0778.15y.x.ff, 'outliers res/unc, whitened; no obvious
      issues and avg looks ok']
  dmx-outliers:
  # - (2012?)  # DM event?
  - [56319.5, 'L-band only, likely gpu failure']
  - [57429.5, 'pulsar is not in 430 MHz obs, L-band only']
  - [57974.0, 'pulsar is not in 430 MHz obs, L-band only']
  - [58514.0, 'pulsar is not in 430 MHz obs, L-band only']
  - [58613.3, L-band only]
  - [58803.7, L-band only]
  - [59050.0, 'L-band only, gpu failure']
  unusual-params:
  other:
  cleared: true

