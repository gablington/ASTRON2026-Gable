source: B1855+09
par-directory: results/
tim-directory: /nanograv/timing/releases/15y/toagen/releases/2021.08.25-9d8d617/
timing-model: B1855+09_PINT_20220301.nb.par
compare-model: archive/B1855+09_PINT_20220223.nb.par
toas:
- B1855+09.327.PUPPI.15y.x.nb.tim
- B1855+09.430.ASP.15y.x.nb.tim
- B1855+09.430.PUPPI.15y.x.nb.tim
- B1855+09.L-wide.ASP.15y.x.nb.tim
- B1855+09.L-wide.PUPPI.15y.x.nb.tim
- B1855+09.S-wide.PUPPI.15y.x.nb.tim

free-params: [PX, ELONG, ELAT, PMELONG, PMELAT, F0, F1, PB, A1, M2, SINI, TASC, EPS1,
  EPS2, FD1, FD2, FD3, JUMP1]
free-dmx: Yes
toa-type: NB
fitter: DownhillGLSFitter
n-iterations: 20
ephem: DE440
bipm: BIPM2019

dmx:  # control dmx windowing/fixing
  ignore-dmx: false
  fratio: 1.1
  max-sw-delay: 0.1 # finer binning when solar wind delay > threshold (us)
  custom-dmx: [] # designated by [mjd_low,mjd_hi,binsize]
outlier: # control outlier analysis runs
  method: gibbs
  n-burn: 1000
  n-samples: 20000

intermediate-results: # use results from previous runs
  noise-dir: /nanograv/share/15yr/timing/intermediate/20220301.Noise.nb.ac12e98/
  compare-noise-dir: /nanograv/share/15yr/timing/intermediate/20220222.Noise.nb.4e07003/
  excised-tim: /nanograv/share/15yr/timing/intermediate/20220209.Outlier.nb.3460db7/B1855+09.nb/B1855+09.nb_excise.tim
  no-corner: true
ignore: # toa excision
  orphaned-rec:
  - S-wide_PUPPI
  poor-febe:
  - 327_PUPPI
  mjd-start:
  mjd-end: 59072.0
  snr-cut: 8
  bad-toa:
  bad-range:
  - [57984, 58447, PUPPI]
  bad-file:
  prob-outlier: 0.1

check:  # check before final
  toa-outliers:
  dmx-outliers:
  unusual-params:
  other:
  cleared: true
