source: J0340+4130
par-directory: results/
tim-directory: /nanograv/timing/releases/15y/toagen/releases/2021.08.25-9d8d617/
timing-model: J0340+4130_PINT_20220302.nb.par
compare-model: archive/J0340+4130_PINT_20220223.nb.par
toas:
- J0340+4130.3GHz.YUPPI.15y.P.nb.tim
- J0340+4130.Rcvr1_2.GUPPI.15y.x.nb.tim
- J0340+4130.Rcvr_800.GUPPI.15y.x.nb.tim

free-params: [PX, ELONG, ELAT, PMELONG, PMELAT, FD1, FD2, F0, F1, JUMP1]
free-dmx: Yes
toa-type: NB
fitter: DownhillGLSFitter
n-iterations: 20
ephem: DE440
bipm: BIPM2019

dmx:  # control dmx windowing/fixing
  ignore-dmx: false
  fratio: 1.1
  max-sw-delay: 0.1 # finer binning when solar wind delay > threshold (us)
  custom-dmx: [] # designated by [mjd_low,mjd_hi,binsize]
outlier: # control outlier analysis runs
  method: gibbs
  n-burn: 1000
  n-samples: 20000

intermediate-results: # use results from previous runs
  noise-dir: /nanograv/share/15yr/timing/intermediate/20220301.Noise.nb.ac12e98/
  compare-noise-dir: /nanograv/share/15yr/timing/intermediate/20220222.Noise.nb.4e07003/
  excised-tim: /nanograv/share/15yr/timing/intermediate/20220209.Outlier.nb.3460db7/J0340+4130.nb/J0340+4130.nb_excise.tim
  no-corner: true
ignore: # toa excision
  mjd-start:
  mjd-end: 59072.0
  poor-febe:
  - 3GHz_YUPPI
  snr-cut: 8
  bad-toa:
  bad-range:
  bad-file:  # designated by basename string {backend}_{mjd}_{source}
  prob-outlier: 0.1

check:  # check before final
  toa-outliers:
  dmx-outliers:
  - [56758.0, 'low SNR at 830 MHz, something odd at 1.5 GHz']
  - [57226.6, 1.5 GHz only]
  unusual-params:
  other:
  cleared: true

