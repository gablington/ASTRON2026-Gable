source: J1643-1224
par-directory: results/
tim-directory: /nanograv/timing/releases/15y/toagen/releases/2021.08.25-9d8d617/
timing-model: J1643-1224_PINT_20220305.nb.par
compare-model: archive/J1643-1224_PINT_20220302.nb.par
toas:
- J1643-1224.3GHz.YUPPI.15y.P.nb.tim
- J1643-1224.Rcvr1_2.GASP.15y.x.nb.tim
- J1643-1224.Rcvr1_2.GUPPI.15y.x.nb.tim
- J1643-1224.Rcvr_800.GASP.15y.x.nb.tim
- J1643-1224.Rcvr_800.GUPPI.15y.x.nb.tim

free-params: [PX, ELONG, ELAT, PMELONG, PMELAT, F0, F1, PB, A1, A1DOT, ECC, EDOT,
  T0, OM, FD1, FD2, FD3, FD4, FD5, JUMP1, JUMP2]
free-dmx: Yes
toa-type: NB
fitter: DownhillGLSFitter
n-iterations: 20
ephem: DE440
bipm: BIPM2019

dmx:  # control dmx windowing/fixing
  ignore-dmx: false
  fratio: 1.1
  max-sw-delay: 0.1 # finer binning when solar wind delay > threshold (us)
  custom-dmx: [] # designated by [mjd_low,mjd_hi,binsize]
outlier: # control outlier analysis runs
  method: gibbs
  n-burn: 1000
  n-samples: 20000

intermediate-results: # use results from previous runs
  noise-dir: /nanograv/share/15yr/timing/intermediate/20220304.Noise.nb.0516a75/
  compare-noise-dir: /nanograv/share/15yr/timing/intermediate/20220301.Noise.nb.ac12e98/
  excised-tim: /nanograv/share/15yr/timing/intermediate/20220209.Outlier.nb.3460db7/J1643-1224.nb/J1643-1224.nb_excise.tim
  no-corner: true
ignore: # toa excision
  mjd-start:
  mjd-end: 59072.0
  snr-cut: 8
  bad-toa:
  - [guppi_55863_J1643-1224_0012.15y.x.ff, 48, 0, snr]
  - [guppi_56922_J1643-1224_0017.15y.x.ff, 35, 0, snr]
  bad-range:
  bad-file:
  prob-outlier: 0.1

check:  # check before final
  toa-outliers:
  dmx-outliers:
  - [57664.28, L-band only]
  unusual-params:
  other:
  cleared: true

