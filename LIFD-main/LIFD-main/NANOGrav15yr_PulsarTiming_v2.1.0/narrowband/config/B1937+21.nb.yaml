source: B1937+21
par-directory: results/
tim-directory: /nanograv/timing/releases/15y/toagen/releases/2021.08.25-9d8d617/
timing-model: B1937+21_PINT_20220306.nb.par
compare-model: archive/B1937+21_PINT_20220302.nb.par
toas:
- B1937+21.430.PUPPI.15y.x.nb.tim
- B1937+21.L-wide.ASP.15y.x.nb.tim
- B1937+21.L-wide.PUPPI.15y.x.nb.tim
- B1937+21.Rcvr1_2.GASP.15y.x.nb.tim
- B1937+21.Rcvr1_2.GUPPI.15y.x.nb.tim
- B1937+21.Rcvr_800.GASP.15y.x.nb.tim
- B1937+21.Rcvr_800.GUPPI.15y.x.nb.tim
- B1937+21.S-wide.ASP.15y.x.nb.tim
- B1937+21.S-wide.PUPPI.15y.x.nb.tim

free-params: [PX, ELONG, ELAT, PMELONG, PMELAT, F0, F1, FD1, FD2, FD3, FD4, FD5, JUMP1,
  JUMP2, JUMP3]
free-dmx: Yes
toa-type: NB
fitter: DownhillGLSFitter
n-iterations: 20
ephem: DE440
bipm: BIPM2019

dmx:  # control dmx windowing/fixing
  ignore-dmx: false
  fratio: 1.1
  max-sw-delay: 0.1 # finer binning when solar wind delay > threshold (us)
  custom-dmx: [] # designated by [mjd_low,mjd_hi,binsize]
outlier: # control outlier analysis runs
  method: gibbs
  n-burn: 1000
  n-samples: 20000

intermediate-results: # use results from previous runs
  noise-dir: /nanograv/share/15yr/timing/intermediate/20220305.Noise.nb.0516a75/
  excised-tim: /nanograv/share/15yr/timing/intermediate/20220209.Outlier.nb.3460db7/B1937+21.nb/B1937+21.nb_excise.tim
  no-corner: true
  compare-noise-dir: /nanograv/share/15yr/timing/intermediate/20220301.Noise.nb.ac12e98/
ignore: # toa excision
  orphaned-rec:
  - 430_PUPPI
  mjd-start:
  mjd-end: 59072.0
  snr-cut: 8
  bad-toa: # designated by [name,chan,subint]
  - [guppi_55275_B1937+21_0003.15y.x.ff, 4, 0, rfi]
  - [guppi_55275_B1937+21_0003.15y.x.ff, 7, 0, rfi]
  - [guppi_55275_B1937+21_0003.15y.x.ff, 14, 0, rfi]
  - [guppi_55275_B1937+21_0003.15y.x.ff, 10, 0, rfi]
  - [guppi_55275_B1937+21_0003.15y.x.ff, 11, 0, rfi]
  # - [guppi_55275_B1937+21_0003.15y.x.ff, 6, 0, rfi]
  - [guppi_55305_B1937+21_0003.15y.x.ff, 6, 0, smeared]
  - [guppi_55305_B1937+21_0003.15y.x.ff, 5, 0, smeared]
  - [guppi_55305_B1937+21_0003.15y.x.ff, 8, 0, smeared]
  - [guppi_55305_B1937+21_0003.15y.x.ff, 13, 0, smeared]
  - [guppi_55305_B1937+21_0003.15y.x.ff, 10, 0, smeared]
  bad-range:
  - [57984, 58447, PUPPI]
  bad-file:
  prob-outlier: 0.1

check:  # check before final
  toa-outliers:
  dmx-outliers:
  unusual-params:
  other:
  cleared: true

