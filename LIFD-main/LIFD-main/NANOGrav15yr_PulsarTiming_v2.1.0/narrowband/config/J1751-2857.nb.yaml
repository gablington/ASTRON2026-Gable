source: J1751-2857
par-directory: results/
tim-directory: /nanograv/timing/releases/15y/toagen/releases/2021.08.25-9d8d617/
timing-model: J1751-2857_PINT_20220301.nb.par
compare-model: archive/J1751-2857_PINT_20220223.nb.par
toas:
- J1751-2857.Rcvr1_2.GASP.15y.x.nb.tim
- J1751-2857.Rcvr1_2.GUPPI.15y.x.nb.tim
- J1751-2857.Rcvr_800.GUPPI.15y.x.nb.tim

free-params: [ELONG, ELAT, PMELONG, PMELAT, PX, F0, F1, A1, PB, OM, T0, ECC, FD1,
  JUMP1]
free-dmx: Yes
toa-type: NB
fitter: DownhillGLSFitter
n-iterations: 20
ephem: DE440
bipm: BIPM2019

dmx:  # control dmx windowing/fixing
  ignore-dmx: false
  fratio: 1.1
  max-sw-delay: 0.1 # finer binning when solar wind delay > threshold (us)
  custom-dmx: [] # designated by [mjd_low,mjd_hi,binsize]
outlier: # control outlier analysis runs
  method: gibbs
  n-burn: 1000
  n-samples: 20000

intermediate-results: # use results from previous runs
  noise-dir: /nanograv/share/15yr/timing/intermediate/20220301.Noise.nb.ac12e98/
  excised-tim: /nanograv/share/15yr/timing/intermediate/20220209.Outlier.nb.3460db7/J1751-2857.nb/J1751-2857.nb_excise.tim
  compare-noise-dir: /nanograv/share/15yr/timing/intermediate/20220222.Noise.nb.4e07003/
  no-corner: true
ignore: # toa excision
  orphaned-rec:
  - Rcvr1_2_GASP
  mjd-start:
  mjd-end: 59072.0
  snr-cut: 8
  bad-toa:
  bad-range:
  bad-file:
  prob-outlier: 0.1

check:  # check before final
  toa-outliers:
  dmx-outliers:
  unusual-params:
  - [Rcvr_800_GUPPI_EQUAD, 'pushing against the prior, 90% of these TOAs cut so there
      may be underlying issues']
  other:
  cleared: true

